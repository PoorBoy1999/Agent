# 邮件读取功能配置
# 使用方式：复制本文件为同目录下的 email_config.toml，填写各项真实值。
# 切勿将含密码的 email_config.toml 提交到版本库。

# ---------------------------------------------------------------------------
# IMAP 服务器（必填）
# ---------------------------------------------------------------------------
# 常见示例（以各服务商最新文档为准）：
#   Gmail:    imap.gmail.com
#   Outlook:  outlook.office365.com
#   QQ 邮箱:  imap.qq.com
#   163 邮箱: imap.163.com
#   188 邮箱: imap.188.com（与 163 同属网易；若报 SELECT Unsafe Login，程序会在 LOGIN 后自动发 IMAP ID，无需改 mailbox）
imap_host = ""

# IMAP 端口：SSL 通常为 993；非 SSL 多为 143
imap_port = 993

# 使用 SSL 加密连接（端口 993 时一般为 true）
use_ssl = true

# 当 use_ssl 为 false 时，是否在普通连接上启用 STARTTLS（常见于 143 端口）
use_starttls = false

# ---------------------------------------------------------------------------
# 登录凭据（必填）
# ---------------------------------------------------------------------------
# 登录名：多数服务商为完整邮箱地址
username = ""

# 密码或「客户端专用密码 / 授权码」（非网页登录密码，按邮箱服务商说明开启 IMAP 并生成）
password = ""

# ---------------------------------------------------------------------------
# 邮箱与行为默认值（可选，也可在工具调用时覆盖 mailbox）
# ---------------------------------------------------------------------------
# 默认打开的邮件夹，一般为 INBOX
mailbox = "INBOX"

# 单次列出邮件的默认上限（工具参数可再缩小）
default_fetch_limit = 20

# 连接超时（秒）
timeout_seconds = 30

# ---------------------------------------------------------------------------
# 网易系（163 / 126 / 188 / yeah）与 IMAP ID（一般可省略）
# ---------------------------------------------------------------------------
# 网易服务器要求在 SELECT 前发送 RFC 2971 的 ID，否则会「SELECT Unsafe Login」。
# 未设置时：若 imap_host 含有 163.com、126.com、188.com、yeah.net 则自动发送。
# send_imap_id = true   # 强制发送（例如自建代理主机名不含上述关键字时）
# send_imap_id = false  # 强制不发送
# 自定义客户端标识（可选，仅影响 ID 内容）
# imap_client_name = "LocalSuperAgent"
# imap_client_version = "1.0"
# imap_client_vendor = "agent-backend"
