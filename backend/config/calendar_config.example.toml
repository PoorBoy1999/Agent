# Windows 本机 Microsoft Outlook 日历（pywin32 / COM）
#
# 无需 Azure 应用注册或令牌文件。前提：
# - 仅在 Windows 上运行；
# - 已安装 Microsoft Outlook 桌面客户端，并完成邮箱与日历配置；
# - Python 环境已安装 pywin32：pip install pywin32
#
# 使用方式：复制本文件为 calendar_config.toml；一般只需确认 timezone。

# ---------------------------------------------------------------------------
# 查询窗口默认时区
# ---------------------------------------------------------------------------
# IANA 时区名，用于计算「起始日 0 点」与范围说明（与 Outlook 本机会话的本地时间一致）
# 中国请填 Asia/Shanghai；不要使用 Asia/Beijing（非 IANA 名）。若误填 Asia/Beijing，程序会映射为 Asia/Shanghai。
timezone = "Asia/Shanghai"

# ---------------------------------------------------------------------------
# 可选：多配置文件名
# ---------------------------------------------------------------------------
# 若本机有多个 Outlook 邮件配置文件且需指定，填写配置显示名称；留空则使用当前默认会话
# mapi_profile = ""
